<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dockLlama — Prompt Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js" defer></script>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242834;
  --border: #2e3345; --text: #e4e6ed; --text-dim: #8b8fa3;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444; --blue: #3b82f6;
  --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.header { padding:1.5rem 2rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:1.4rem; font-weight:600; }
.header h1 span { color:var(--blue); }
nav { padding:0.75rem 2rem; border-bottom:1px solid var(--border); display:flex; gap:1rem; }
nav a { color:var(--text-dim); text-decoration:none; padding:0.4rem 0.8rem; border-radius:6px; font-size:0.85rem; }
nav a.active, nav a:hover { color:var(--text); background:var(--surface2); }
.content { max-width:900px; margin:0 auto; padding:2rem; }
.section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.5rem; }
.section h2 { font-size:1.1rem; margin-bottom:0.5rem; }
.section p.desc { color:var(--text-dim); font-size:0.85rem; margin-bottom:1.25rem; line-height:1.5; }
.btn { padding:0.5rem 1rem; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.85rem; cursor:pointer; }
.btn:hover { background:var(--border); }
.btn-primary { background:var(--blue); border-color:var(--blue); color:#fff; }
.btn-primary:hover { opacity:0.9; }
.btn-test { border-color:var(--green); color:var(--green); }
.btn-test:hover { background:#22c55e22; }
.btn-danger { border-color:var(--red); color:var(--red); }
.btn-danger:hover { background:#ef444422; }
.btn-row { display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; }
select, textarea, input[type="text"], input[type="number"] {
  background:var(--surface2); border:1px solid var(--border); border-radius:6px;
  padding:0.5rem 0.75rem; color:var(--text); font-size:0.85rem; width:100%;
}
select:focus, textarea:focus, input:focus { outline:none; border-color:var(--blue); }
textarea { font-family:'SF Mono',Monaco,'Cascadia Code',monospace; min-height:120px; resize:vertical; line-height:1.5; }
label { display:block; font-size:0.85rem; color:var(--text-dim); margin-bottom:0.4rem; }
.field { margin-bottom:1rem; }
.source-badge { display:inline-block; padding:0.2rem 0.5rem; border-radius:4px; font-size:0.75rem; font-weight:600; }
.source-config { background:#3b82f622; color:var(--blue); border:1px solid var(--blue); }
.source-database { background:#22c55e22; color:var(--green); border:1px solid var(--green); }
.example-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:1rem; margin-bottom:0.75rem; }
.example-card .field:last-child { margin-bottom:0; }
.pattern-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; align-items:center; }
.pattern-row input { flex:1; }
.btn-icon { background:none; border:1px solid var(--border); border-radius:6px; padding:0.4rem 0.6rem; color:var(--text-dim); cursor:pointer; font-size:0.85rem; }
.btn-icon:hover { color:var(--red); border-color:var(--red); }
.test-result { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:1rem; margin-top:1rem; }
.test-result h3 { font-size:0.95rem; margin-bottom:0.5rem; }
.score-badge { display:inline-block; padding:0.3rem 0.7rem; border-radius:6px; font-weight:700; font-size:1.1rem; }
.score-healthy { background:#22c55e22; color:var(--green); }
.score-degraded { background:#eab30822; color:var(--yellow); }
.score-unhealthy { background:#f9731622; color:var(--orange); }
.score-critical { background:#ef444422; color:var(--red); }
.toast { position:fixed; bottom:2rem; right:2rem; padding:0.75rem 1.25rem; border-radius:8px; font-size:0.85rem; z-index:100; transition:opacity 0.3s; }
.toast-success { background:#22c55e22; border:1px solid var(--green); color:var(--green); }
.toast-error { background:#ef444422; border:1px solid var(--red); color:var(--red); }
.loading { color:var(--text-dim); font-style:italic; }
</style>
</head>
<body x-data="promptEditor()">
<div class="header">
  <h1>dock<span>Llama</span></h1>
</div>
<nav>
  <a href="/">Dashboard</a>
  <a href="/explorer.html">Log Explorer</a>
  <a href="/digest.html">Digest</a>
  <a href="/prompts.html" class="active">Prompts</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="content">
  <!-- Container Selector -->
  <div class="section">
    <h2>Container Prompt Editor</h2>
    <p class="desc">Configure per-container context prompts, few-shot examples, and known patterns. Changes saved to the database override config.yaml values and take effect on the next evaluation cycle.</p>
    <div class="field">
      <label>Select Container</label>
      <select @change="loadPrompt($event.target.value)" x-model="selectedContainer">
        <option value="">— choose a container —</option>
        <template x-for="c in containers" :key="c.name">
          <option :value="c.name" x-text="c.name"></option>
        </template>
      </select>
    </div>
  </div>

  <!-- Prompt Config (shown when container selected) -->
  <template x-if="selectedContainer && loaded">
    <div>
      <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <h2>Context Prompt</h2>
          <span class="source-badge" :class="source === 'database' ? 'source-database' : 'source-config'"
                x-text="source === 'database' ? 'DB Override' : 'Config'"></span>
        </div>
        <p class="desc">Explain what's normal for this container. This text is appended to the system prompt as "Container-Specific Context."</p>
        <div class="field">
          <textarea x-model="contextPrompt" rows="8" placeholder="This is a PostgreSQL database. Shutdown FATAL messages are normal..."></textarea>
        </div>
      </div>

      <!-- Examples -->
      <div class="section">
        <h2>Few-Shot Examples</h2>
        <p class="desc">Calibration examples showing the AI how to score specific log patterns for this container.</p>
        <template x-for="(ex, i) in examples" :key="i">
          <div class="example-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
              <strong style="font-size:0.9rem;" x-text="'Example ' + (i+1)"></strong>
              <button class="btn-icon" @click="examples.splice(i, 1)" title="Remove">&times;</button>
            </div>
            <div class="field">
              <label>Label</label>
              <input type="text" x-model="ex.label" placeholder="Normal PostgreSQL shutdown (healthy)">
            </div>
            <div class="field">
              <label>Log Snippet</label>
              <textarea x-model="ex.log_snippet" rows="4" placeholder="FATAL: terminating connection..."></textarea>
            </div>
            <div style="display:flex; gap:1rem;">
              <div class="field" style="flex:1;">
                <label>Correct Status</label>
                <select x-model="ex.correct_status">
                  <option value="healthy">healthy</option>
                  <option value="degraded">degraded</option>
                  <option value="unhealthy">unhealthy</option>
                  <option value="critical">critical</option>
                </select>
              </div>
              <div class="field" style="flex:1;">
                <label>Correct Score</label>
                <input type="number" x-model.number="ex.correct_score" min="0" max="100">
              </div>
            </div>
            <div class="field">
              <label>Reasoning</label>
              <textarea x-model="ex.reasoning" rows="2" placeholder="Why this score is correct..."></textarea>
            </div>
          </div>
        </template>
        <button class="btn" @click="examples.push({label:'',log_snippet:'',correct_status:'healthy',correct_score:95,reasoning:''})">+ Add Example</button>
      </div>

      <!-- Known Patterns -->
      <div class="section">
        <h2>Known Patterns</h2>
        <p class="desc">Regex patterns that tag matching log lines with metadata (e.g., [ROUTINE: description]). Tags help the AI understand which errors are expected.</p>
        <template x-for="(kp, i) in knownPatterns" :key="i">
          <div class="pattern-row">
            <input type="text" x-model="kp.pattern" placeholder="regex pattern" style="flex:2;">
            <input type="text" x-model="kp.tag" placeholder="[ROUTINE: description]" style="flex:2;">
            <button class="btn-icon" @click="knownPatterns.splice(i, 1)" title="Remove">&times;</button>
          </div>
        </template>
        <button class="btn" @click="knownPatterns.push({pattern:'',tag:'[ROUTINE: ]'})" style="margin-top:0.5rem;">+ Add Pattern</button>
      </div>

      <!-- Actions -->
      <div class="section">
        <div class="btn-row">
          <button class="btn btn-primary" @click="save()" :disabled="saving">
            <span x-text="saving ? 'Saving...' : 'Save to Database'"></span>
          </button>
          <button class="btn btn-test" @click="testPrompt()" :disabled="testing">
            <span x-text="testing ? 'Testing...' : 'Test Against Current Logs'"></span>
          </button>
          <button class="btn btn-danger" @click="revertToConfig()" x-show="source === 'database'">Revert to Config</button>
        </div>

        <!-- Test Result -->
        <template x-if="testResult">
          <div class="test-result">
            <h3>Test Result</h3>
            <div style="display:flex; gap:1.5rem; align-items:center; margin-bottom:0.75rem;">
              <span class="score-badge" :class="scoreClass(testResult.health_score)" x-text="testResult.health_score"></span>
              <span style="font-size:0.95rem; font-weight:600;" x-text="testResult.status.toUpperCase()"></span>
              <span style="color:var(--text-dim); font-size:0.85rem;" x-text="'Confidence: ' + testResult.confidence + '%'"></span>
              <span style="color:var(--text-dim); font-size:0.85rem;" x-text="testResult.eval_time_seconds + 's'"></span>
            </div>
            <p style="font-size:0.85rem; line-height:1.5;" x-text="testResult.summary"></p>
          </div>
        </template>
      </div>
    </div>
  </template>

  <template x-if="selectedContainer && !loaded">
    <p class="loading">Loading prompt configuration...</p>
  </template>
</div>

<!-- Toast -->
<div x-show="toast.show" x-transition class="toast" :class="'toast-' + toast.type" x-text="toast.msg"
     @click="toast.show = false"></div>

<script>
function promptEditor() {
  return {
    containers: [],
    selectedContainer: '',
    loaded: false,
    source: 'config',
    contextPrompt: '',
    examples: [],
    knownPatterns: [],
    configFallback: null,
    saving: false,
    testing: false,
    testResult: null,
    toast: { show: false, msg: '', type: 'success' },

    async init() {
      const r = await fetch('/api/containers');
      const data = await r.json();
      this.containers = data.filter(c => c.running || true);
    },

    async loadPrompt(name) {
      if (!name) { this.loaded = false; return; }
      this.loaded = false;
      this.testResult = null;
      try {
        const r = await fetch(`/api/containers/${name}/prompt`);
        if (!r.ok) throw new Error('Not found');
        const data = await r.json();
        this.contextPrompt = data.context_prompt || '';
        this.examples = (data.examples || []).map(e => ({...e}));
        this.knownPatterns = (data.known_patterns || []).map(p => ({...p}));
        this.source = data.source;
        this.configFallback = data.config_fallback;
        this.loaded = true;
      } catch(e) {
        this.showToast('Failed to load prompt config', 'error');
      }
    },

    async save() {
      this.saving = true;
      try {
        const body = {
          context_prompt: this.contextPrompt || null,
          examples: this.examples.filter(e => e.label || e.log_snippet),
          known_patterns: this.knownPatterns.filter(p => p.pattern),
        };
        const r = await fetch(`/api/containers/${this.selectedContainer}/prompt`, {
          method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error('Save failed');
        this.source = 'database';
        this.showToast('Saved to database', 'success');
      } catch(e) {
        this.showToast('Save failed: ' + e.message, 'error');
      }
      this.saving = false;
    },

    async testPrompt() {
      this.testing = true;
      this.testResult = null;
      try {
        const body = {
          context_prompt: this.contextPrompt || null,
          examples: this.examples.filter(e => e.label || e.log_snippet),
          known_patterns: this.knownPatterns.filter(p => p.pattern),
        };
        const r = await fetch(`/api/containers/${this.selectedContainer}/test-prompt`, {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error('Test failed');
        this.testResult = await r.json();
      } catch(e) {
        this.showToast('Test failed: ' + e.message, 'error');
      }
      this.testing = false;
    },

    async revertToConfig() {
      if (!confirm('Delete database overrides and revert to config.yaml values?')) return;
      try {
        const r = await fetch(`/api/containers/${this.selectedContainer}/prompt`, { method: 'DELETE' });
        if (!r.ok) throw new Error('Delete failed');
        await this.loadPrompt(this.selectedContainer);
        this.showToast('Reverted to config.yaml', 'success');
      } catch(e) {
        this.showToast('Revert failed: ' + e.message, 'error');
      }
    },

    scoreClass(score) {
      if (score >= 80) return 'score-healthy';
      if (score >= 40) return 'score-degraded';
      if (score >= 10) return 'score-unhealthy';
      return 'score-critical';
    },

    showToast(msg, type) {
      this.toast = { show: true, msg, type };
      setTimeout(() => this.toast.show = false, 3000);
    },
  };
}
</script>
</body>
</html>
