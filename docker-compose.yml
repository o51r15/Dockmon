services:
  dockmon:
    build: .
    container_name: dockmon
    restart: unless-stopped
    ports:
      - "8556:8556"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config.yaml:/app/config/config.yaml:ro
      - dockmon-data:/app/data
    environment:
      - TZ=America/New_York

volumes:
  dockmon-data:
