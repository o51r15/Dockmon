ollama:
  base_url: "http://localhost:11434"
  default_model: "llama3.1:8b"
  digest_model: "gemma4:latest"
  timeout_seconds: 120

monitoring:
  poll_interval_seconds: 300
  log_lines_per_check: 200
  dry_run: true
  db_path: "/app/data/dockmon.db"
  retention_days: 90

containers:
  # Add your containers here. Examples:
  #
  # Simple container:
  # - name: "nginx"
  #   enabled: true
  #   ignore_patterns: []
  #   compose_group: null
  #
  # Container with ignore patterns (filter noisy log lines):
  # - name: "postgres"
  #   enabled: true
  #   ignore_patterns:
  #     - "checkpoint starting"
  #     - "checkpoint complete"
  #   compose_group: "myapp"
  #
  # Compose group: containers in the same group restart together.
  # - name: "myapp-web"
  #   enabled: true
  #   ignore_patterns:
  #     - '^\d{4}/\d{2}/\d{2}.*DEBUG'
  #   compose_group: "myapp"
  #   model_override: null  # optional: use a different model for this container

  - name: "example-container"
    enabled: false
    ignore_patterns: []
    compose_group: null

cooldowns:
  initial_minutes: 5
  backoff_multiplier: 3
  max_cooldown_minutes: 120
  max_restarts_per_hour: 3

alerts:
  urls: []
  # - "discord://webhook_id/webhook_token"
  # - "gotify://hostname/token"
  # See https://github.com/caronc/apprise for supported services

digest:
  enabled: true
  schedule_cron: "0 7 * * *"
