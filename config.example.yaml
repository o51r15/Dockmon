ollama:
  base_url: "http://192.168.1.125:11434"
  default_model: "gemma4:latest"
  digest_model: "gemma4:latest"
  timeout_seconds: 120

monitoring:
  poll_interval_seconds: 60
  log_lines_per_check: 200
  dry_run: true
  db_path: "/home/o51r15/scripts/dockmon/data/dockmon.db"

containers:
  - name: "bitmagnet"
    enabled: true
    model_override: null
    ignore_patterns:
      - "^\\d{4}/\\d{2}/\\d{2}.*DEBUG"
    compose_group: null
  - name: "bitmagnet-postgres"
    enabled: true
    ignore_patterns:
      - "checkpoint starting"
      - "checkpoint complete"
    compose_group: null
  - name: "bentopdf"
    enabled: true
    ignore_patterns: []
    compose_group: null

cooldowns:
  initial_minutes: 5
  backoff_multiplier: 3
  max_cooldown_minutes: 120
  max_restarts_per_hour: 3

alerts:
  urls: []
  # - "discord://webhook_id/webhook_token"
  # - "gotify://hostname/token"

digest:
  enabled: true
  schedule_cron: "0 7 * * *"
